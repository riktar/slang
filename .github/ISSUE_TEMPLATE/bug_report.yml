name: Bug Report
description: Report a bug or unexpected behavior in SLANG
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: When I run `slang run myflow.slang`, it...
    validations:
      required: true

  - type: textarea
    id: slang-file
    attributes:
      label: SLANG File (minimal reproduction)
      description: The `.slang` code that triggers the bug. Please minimize it to the smallest example that still reproduces the issue.
      render: text
      placeholder: |
        flow "example" {
          agent A {
            stake ...
          }
        }
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      render: shell
      placeholder: slang run example.slang --adapter openai
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include the full error output if available.
    validations:
      required: true

  - type: input
    id: slang-version
    attributes:
      label: SLANG Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
